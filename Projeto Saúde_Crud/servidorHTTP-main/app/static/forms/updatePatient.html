<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar paciente</title>
</head>
<body>
    <h1>Atualizar paciente</h1>

    <form action="/updatePatient" method="POST">
        <input type="hidden" name="id" value="{{.ID}}">

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" value="{{.Nome}}" required>
        <br><br>

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" value="{{.CPF}}" required>
        <br><br>

        <label for="idade">Idade</label>
        <input type="number" id="idade" name="idade" value="{{.Idade}}" required>
        <br><br>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" value="{{.Email}}" required>
        <br><br>

        <label for="ocorrencia">Ocorrência</label>
        <input type="text" id="ocorrencia" name="ocorrencia" value="{{.Ocorrência}}">
        <br><br>

        <label for="tipoSanguineo">Tipo Sanguíneo</label>
        <select id="tipoSanguineo" name="tipoSanguineo">
            <option value="" {{if eq .TipoSanguineo ""}}selected{{end}}>Selecione</option>
            <option value="A+" {{if eq .TipoSanguineo "A+"}}selected{{end}}>A+</option>
            <option value="A-" {{if eq .TipoSanguineo "A-"}}selected{{end}}>A-</option>
            <option value="B+" {{if eq .TipoSanguineo "B+"}}selected{{end}}>B+</option>
            <option value="B-" {{if eq .TipoSanguineo "B-"}}selected{{end}}>B-</option>
            <option value="AB+" {{if eq .TipoSanguineo "AB+"}}selected{{end}}>AB+</option>
            <option value="AB-" {{if eq .TipoSanguineo "AB-"}}selected{{end}}>AB-</option>
            <option value="O+" {{if eq .TipoSanguineo "O+"}}selected{{end}}>O+</option>
            <option value="O-" {{if eq .TipoSanguineo "O-"}}selected{{end}}>O-</option>
        </select>
        <br><br>

        <label for="sintomas">Sintomas</label>
        <textarea id="sintomas" name="sintomas">{{.Sintomas}}</textarea>
        <br><br>

        <label for="diagnostico">Diagnóstico</label>
        <textarea id="diagnostico" name="diagnostico">{{.Diagnostico}}</textarea>
        <br><br>

        <button type="submit">Atualizar</button>
    </form>

    <br>
    <a href="/patients">Voltar</a>
</body>
</html>
