<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Paciente</title>
</head>
<body>
    <h1>Cadastrar Paciente</h1>

    <form action="/createPatient" method="POST">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required>
        <br><br>

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" required>
        <br><br>

        <label for="idade">Idade</label>
        <input type="number" id="idade" name="idade" required>
        <br><br>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="ocorrencia">Ocorrência</label>
        <input type="text" id="ocorrencia" name="ocorrencia">
        <br><br>

        <label for="tipoSanguineo">Tipo Sanguíneo</label>
        <select id="tipoSanguineo" name="tipoSanguineo">
            <option value="">Selecione</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
        </select>
        <br><br>

        <label for="sintomas">Sintomas</label>
        <textarea id="sintomas" name="sintomas"></textarea>
        <br><br>

        <label for="diagnostico">Diagnóstico</label>
        <textarea id="diagnostico" name="diagnostico"></textarea>
        <br><br>

        <button type="submit">Cadastrar</button>
    </form>

    <br>
    <a href="/">Voltar</a>
</body>
</html>
